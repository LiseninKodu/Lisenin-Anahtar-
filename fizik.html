        let currentTopics = [];

        function loadGrade(grade) {
            document.querySelectorAll('.grade-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(grade)) btn.classList.add('active');
            });

            currentTopics = dersVerisi[grade] || [];
            const topicList = document.getElementById('topicList');
            topicList.innerHTML = '';

            if(currentTopics.length === 0) {
                topicList.innerHTML = '<p style="color:#64748b;">Bu sınıfa ait konu henüz eklenmedi.</p>';
                document.getElementById('mainContent').innerHTML = '<div class="content-card active" style="text-align:center;">Lütfen yapay zekanın vereceği kod bloğunu bu dosyanın içine yapıştırın.</div>';
                return;
            }

            currentTopics.forEach((topic, index) => {
                const btn = document.createElement('button');
                btn.className = 'topic-btn';
                btn.innerText = topic.title;
                btn.onclick = () => renderTopic(index, btn);
                topicList.appendChild(btn);
            });

            renderTopic(0, topicList.firstChild);
        }

        function renderTopic(index, btnElement) {
            document.querySelectorAll('.topic-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const topic = currentTopics[index];
            const mainContent = document.getElementById('mainContent');
            
            let html = `<div class="content-card active">
                <h2>${topic.title}</h2>
                <div class="summary-box">${topic.summary}</div>
                <div class="desc-text">${topic.description}</div>
            `;

            if(topic.formula) html += `<div class="formula-box">${topic.formula}</div>`;
            if(topic.question) {
                html += `<div class="example-box">
                            <h5 style="color:#047857; margin-bottom:0.8rem; display:flex; align-items:center;">✍️ Çözümlü Örnek</h5>
                            <div style="font-weight:600; color:#065f46; margin-bottom:1rem;">Soru: ${topic.question}</div>
                            <div style="color:#064e3b; border-top:2px dashed #a7f3d0; padding-top:1rem; line-height:1.7;">
                                <strong>Çözüm:</strong> ${topic.solution}
                            </div>
                         </div>`;
            }
            if(topic.shortcut) html += `<div class="shortcut-box"><strong>🚀 Püf Noktası:</strong> ${topic.shortcut}</div>`;
            
            html += `</div>`;
            mainContent.innerHTML = html;
