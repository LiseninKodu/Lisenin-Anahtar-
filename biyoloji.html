                    description: "<p><strong>Canlıların Ortak Özellikleri:</strong> Hücresel yapı (Prokaryot/Ökaryot), beslenme, solunum (ATP üretimi), boşaltım, hareket, uyarılara tepki, metabolizma (Anabolizma+Katabolizma), homeostazi (iç denge), uyum (adaptasyon), üreme ve büyüme-gelişme.</p><p><strong>İnorganik Bileşikler:</strong> Canlıların üretemeyip dışarıdan hazır aldığı, sindirilmeden kana geçen ve <em>enerji vermeyen</em> maddelerdir (Su, asit, baz, tuz, mineraller).</p><p><strong>Organik Bileşikler:</strong> Yapısında C, H ve O atomlarını bulunduran, canlıların sentezleyebildiği maddelerdir.<br>- <em>Karbonhidratlar:</em> 1. dereceden enerji vericilerdir (Glikoz, Fruktoz, Glikojen, Nişasta, Selüloz).<br>- <em>Lipitler (Yağlar):</em> 2. dereceden ancak en çok enerji veren yedek depolardır. Hücre zarına katılırlar (Fosfolipit) ve yalıtım sağlarlar.<br>- <em>Proteinler:</em> Yapıcı ve onarıcıdırlar. Amino asitlerin peptit bağlarıyla birleşmesinden oluşurlar. DNA şifresine göre sentezlenen tek moleküldür.<br>- <em>Enzimler:</em> Tepkimeleri hızlandıran ve aktivasyon enerjisini düşüren biyolojik katalizörlerdir. Protein yapılıdırlar, sıcaklık ve pH değişimlerinden etkilenirler.</p>",

                    description: "<p><strong>Sınıflandırma (Taksonomi):</strong> Canlıların DNA, protein, organ ve embriyonik benzerliklerine göre yapılan sınıflandırmaya Doğal (Filogenetik) Sınıflandırma denir. Canlılar şu basamaklara ayrılır (Türkiye Cumhuriyeti A Takımı Sahada Şut Attı): <strong>Tür $\\rightarrow$ Cins $\\rightarrow$ Aile (Familya) $\\rightarrow$ Takım $\\rightarrow$ Sınıf $\\rightarrow$ Şube $\\rightarrow$ Alem.</strong> Türden aleme doğru gidildikçe canlı sayısı artar, ortak gen ve benzerlik azalır.</p><p><strong>İkili Adlandırma (Binomial):</strong> Latince iki kelimeyle yapılır (Örn: <em>Pinus nigra</em>). İlk kelime Cins adı (Akrabalığı belirler), ikinci kelime tamamlayıcı addır. İkisi birden Tür adını oluşturur.</p><p><strong>Canlı Alemleri:</strong><br>1. <em>Bakteriler:</em> Tamamı tek hücreli ve Prokaryottur. Peptidoglikan hücre duvarları vardır.<br>2. <em>Arkeler:</em> Aşırı ekstrem koşullarda (çok sıcak, çok tuzlu, metan gazlı) yaşayan dirençli prokaryotlardır.<br>3. <em>Protistler:</em> Ökaryota geçiş alemidir. Amip, Öglena, Paramesyum ve Algler buradadır.<br>4. <em>Mantarlar (Fungi):</em> Tüketicidirler (Heterotrof). Kloroplastları yoktur, fotosentez YAPAMAZLAR. Hücre çeperleri Kitin'den oluşur.<br>5. <em>Bitkiler:</em> Üreticidirler (Ototrof). Selüloz çeperleri vardır.<br>6. <em>Hayvanlar:</em> Omurgasızlar (Sünger, Sölenter, Solucan, Yumuşakça, Eklembacaklı) ve Omurgalılar (Balık, Kurbağa, Sürüngen, Kuş, Memeli) olarak ayrılırlar. İnsan, memeliler sınıfındadır.</p><p><strong>Virüsler:</strong> Hücresel yapıları yoktur. Sadece protein kılıf ve yönetici molekül (DNA veya RNA) içerirler. Sadece canlı bir hücrenin içine girdiklerinde çoğalabilen 'Zorunlu Hücre İçi Parazit'lerdir.</p>",

            } else {
                resultBox.innerHTML = "<b>Hata:</b> Google soruyu çözdü ama boş cevap gönderdi.";
            }
            
        } catch (err) {
            resultBox.innerHTML = "<b>Bağlantı Hatası:</b> " + err.message;
        }
    }

        window.onload = () => loadGrade(9);
    </script>
