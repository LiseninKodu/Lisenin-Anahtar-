    <script>

        // İŞTE BİRLİKTE DOLDURACAĞIMIZ BOŞ VERİ TABANI
        const dersVerisi = {
            9: [
                                {
                    title: "1. Pronouns, Nouns & Articles (Zamirler, İsimler ve Tanımlayıcılar)",
                    summary: "Subject/Object zamirler, sayılabilen/sayılamayan isimler ve a/an/the kullanımı.",
                    description: "<p><strong>Pronouns (Zamirler):</strong> İsmin yerini tutan kelimelerdir. İngilizcede cümlede bulundukları yere göre şekil değiştirirler.<br>- <em>Subject Pronouns (Özne):</em> I, You, He, She, It, We, They. (Fiilden önce gelir).<br>- <em>Object Pronouns (Nesne):</em> Me, You, Him, Her, It, Us, Them. (Fiilden veya edattan sonra gelir).<br>- <em>Possessive Adjectives (İyelik Sıfatları):</em> My, Your, His, Her... (Mutlaka kendisinden sonra bir isim alır: My car).<br>- <em>Reflexive Pronouns (Dönüşlülük):</em> Myself, Yourself, Themselves... (Özne ve nesne aynı kişiyse veya eylemi 'kendi başına' yaptığını vurgulamak için 'by' ile kullanılır).</p><p><strong>Nouns (İsimler):</strong> Countable (Sayılabilen - çoğul '-s' takısı alabilir) ve Uncountable (Sayılamayan - sıvı, gaz, soyut kavramlar, çoğul yapılamaz) olarak ayrılır. <em>Information, advice, furniture, news, money, hair</em> İngilizcede <strong>sayılamaz (uncountable)</strong> kabul edilir ve her zaman tekil fiil (is/was) alır.</p><p><strong>Articles (a / an / the):</strong><br>- <em>a / an:</em> Belirsiz, herhangi bir tekil ismin önüne gelir (a car, an apple).<br>- <em>the:</em> Hem konuşanın hem de dinleyenin bildiği, 'belirli' isimlerin önüne gelir. (The sun, the car we bought yesterday).</p>",
                    items: ["Subject, Object ve Possessive Pronouns Farkları", "Reflexive Pronouns (Dönüşlülük Zamirleri)", "Countable ve Uncountable Nouns Kuralları", "Sayılamayan İstisna İsimler (News, Advice, Furniture)", "Definite (The) ve Indefinite (A/An) Articles"],
                    formula: "$$\\text{By + Reflexive Pronoun = On one's own (Kendi başına/Yalnız)}$$",
                    question: "Boşlukları uygun zamirlerle doldurunuz: <br>'My sister and I painted the room all by ________. It took ________ three days, but we are proud of ________.'",
                    solution: "Adım adım kuralları uygulayalım:<br>1. Özne 'My sister and I' (Kız kardeşim ve ben), yani <strong>'We' (Biz)</strong>.<br>2. 'By' edatından sonra eylemi kimse yardım etmeden kendi başımıza yaptığımızı vurgulamak için dönüşlülük zamiri (Reflexive) kullanmalıyız. 'We' öznesinin dönüşlülük zamiri <strong>'ourselves'</strong>tir.<br>3. 'It took...' (Bizim 3 günümüzü aldı). Fiilden sonra 'bizi/bize' anlamında nesne zamiri (Object Pronoun) gelmelidir. 'We' öznesinin nesne hali <strong>'us'</strong>tır.<br>4. 'Proud of...' (Kendimizle gurur duyuyoruz). Yine özne ve nesne aynı kişiler olduğu için dönüşlülük zamiri <strong>'ourselves'</strong> gelir.<br><br><strong>Cevap: ourselves / us / ourselves.</strong>",
                    shortcut: "YDT'de en çok sorulan tuzaklardan biri 'News (Haber)' ve 'Furniture (Mobilya)' kelimeleridir. Sonundaki 's' harfine aldanma, 'news' sayılamaz (uncountable) bir kelimedir ve DAİMA tekil fiil alır (The news <strong>is</strong> good)."
                },
                {
                    title: "2. Tenses I (Present Simple, Present Continuous, Past Simple)",
                    summary: "Geniş zaman, şimdiki zaman ve geçmiş zamanın temel kuralları.",
                    description: "<p><strong>Present Simple (Geniş Zaman):</strong> Alışkanlıkları, rutinleri ve genel geçer bilimsel doğruları anlatır.<br>- <em>Kural:</em> He/She/It öznelerinde fiil '-s, -es, -ies' takısı alır (He plays). Soru ve olumsuzlarda <em>Do/Does</em> yardımcı fiili kullanılır.<br>- <em>Zaman Zarfları:</em> Always, usually, often, sometimes, rarely, never, every day.</p><p><strong>Present Continuous (Şimdiki Zaman):</strong> Şu anda konuşma anında yapılan veya geçici olan eylemleri anlatır.<br>- <em>Kural:</em> am/is/are + V(ing) (She is sleeping).<br>- <em>Zaman Zarfları:</em> Now, right now, at the moment, currently, nowadays.<br>- <strong>DİKKAT (Stative Verbs):</strong> Duygu, düşünce, sahiplik ve duyu bildiren fiiller (Know, believe, understand, love, hate, want, need, belong, own) <strong>İNG (Continuous) takısı ALMAZLAR</strong>. Şu anı anlatsalar bile Present Simple ile yazılırlar (I am knowing you YANLIŞ, I know you DOĞRU).</p><br><p><strong>Past Simple (Di'li Geçmiş Zaman):</strong> Geçmişte belirli bir zamanda başlamış ve bitmiş eylemleri anlatır.<br>- <em>Kural:</em> Düzenli fiillere '-ed' takısı gelir (played), düzensiz fiiller tamamen değişir (go $\\rightarrow$ went). Soru ve olumsuzlarda <em>Did</em> yardımcı fiili kullanılır ve ana fiil 1. haline (V1) döner (Did you go?).<br>- <em>Zaman Zarfları:</em> Yesterday, last week, ...ago, in 1990.</p>",
                    items: ["Present Simple (Rutinler ve Do/Does)", "Present Continuous (Şu an ve Am/Is/Are + Ving)", "Stative Verbs (Durum Fiilleri) ve -ing Almayan Fiiller", "Past Simple (Geçmişte Biten Olaylar ve Did)", "Düzenli (-ed) ve Düzensiz (Irregular) Fiiller"],
                    formula: "$$\\text{Past Simple Soru: } \\text{Did } + \\text{ Subject } + \\text{ V}_1 \\text{ (Yalın Fiil)}$$",
                    question: "Aşağıdaki cümlede yer alan gramer hatasını (Stative Verb kuralına göre) bulup düzeltiniz:<br>'I am not understanding what the teacher is saying right now, because I am needing a short break.'",
                    solution: "Cümledeki zaman zarfı 'right now' (şu anda) olduğu için yazar Present Continuous (am/is/are + ing) kullanmak istemiş.<br>Ancak kurala göre zihinsel durum ve ihtiyaç bildiren fiiller (Stative Verbs) '-ing' takısı ALAMAZLAR.<br>1. 'Understand' (Anlamak) zihinsel bir süreçtir, '-ing' almaz. 'I am not understanding' yerine <strong>'I don't understand'</strong> olmalıdır.<br>2. 'Say' (Söylemek) bir eylem (Action) fiilidir, '-ing' ALABİLİR. 'is saying' <strong>DOĞRUDUR</strong>.<br>3. 'Need' (İhtiyaç duymak) bir durum (Stative) fiilidir, '-ing' almaz. 'I am needing' yerine <strong>'I need'</strong> olmalıdır.<br><br><strong>Cevap: 'I don't understand what the teacher is saying right now, because I need a short break.'</strong>",
                    shortcut: "YDT'de bir Tense sorusu çözerken cümlenin EN SONUNDA veya başında gizlenmiş zaman zarfına (Time Expression) bak. 'Yesterday, ago, in 1999' varsa kesinlikle V2 (Past Simple) ara. 'Currently, at present' varsa (am/is/are V-ing) ara."
                },
                {
                    title: "3. Prepositions of Time & Place (Zaman ve Yer Edatları)",
                    summary: "In, On, At kullanımları ve kalıplaşmış (Dependent) edatlar.",
                    description: "<p>Edatlar (Prepositions) kelimeleri birbirine bağlar ve YDT'de her yıl mutlaka 2 soru olarak karşımıza çıkar.</p><p><strong>Zaman Edatları (Time):</strong> Büyükten küçüğe doğru (Üçgen kuralı) daralır.<br>- <strong>IN (Geniş zamanlar):</strong> Yıllarda (in 2023), aylarda (in May), mevsimlerde (in summer), yüzyıllarda (in the 21st century) ve günün bölümlerinde (in the morning/afternoon/evening) kullanılır.<br>- <strong>ON (Günler ve Tarihler):</strong> Sadece günlerde (on Monday), tam tarihlerde (on 5th May 2023) ve özel günlerde (on my birthday, on New Year's Day) kullanılır.<br>- <strong>AT (Nokta zamanlar):</strong> Saatlerde (at 5 o'clock), anlık/nokta zamanlarda (at noon, at night, at midnight, at the weekend, at present) kullanılır.</p><p><strong>Yer Edatları (Place):</strong><br>- <strong>IN (İçinde/Kapsayan):</strong> Şehirlerde, ülkelerde (in London, in Turkey), kapalı veya sınırları belli alanlarda (in a room, in the park) kullanılır.<br>- <strong>ON (Üstünde/Yüzeyde):</strong> Yüzeye temas eden durumlarda (on the table, on the wall), sokak/cadde isimlerinde (on Oxford Street) ve toplu taşımalarda -içinde rahatça yürünebilen- (on a bus, on a train, on a plane) kullanılır. Arabada ise 'in a car' denir.<br>- <strong>AT (Noktada/Belirli bir yerde):</strong> Tam ve belirli adreslerde (at 45 Oxford Street), kurum veya binaların işlevsel kullanımında (at school, at the hospital, at the bus stop) kullanılır.</p>",
                    items: ["IN: Aylar, Yıllar, Ülkeler, Şehirler", "ON: Günler, Tam Tarihler, Yüzeyler", "AT: Saatler, Gece (Night), Kesin Adresler", "Toplu Taşımalarda On / In Ayrımı (On a train / In a car)", "Between (İki şey arası) ve Among (Üç ve daha fazla şey arası)"],
                    formula: null,
                    question: "Boşluklara (in, on, at) edatlarından uygun olanları yerleştiriniz:<br>'My flight to Paris is ___ Monday. It leaves ___ 8:30 AM. I will arrive ___ France ___ the afternoon.'",
                    solution: "Kuralları sırasıyla uygulayalım:<br>1. 'Monday' (Pazartesi) bir GÜN ismidir. Günlerin önüne her zaman <strong>ON</strong> gelir.<br>2. '8:30 AM' bir SAAT bildirimidir. Saatlerin önüne her zaman <strong>AT</strong> gelir.<br>3. 'France' (Fransa) bir ÜLKE ismidir. Ülke ve şehirlerin önüne her zaman <strong>IN</strong> gelir.<br>4. 'the afternoon' (öğleden sonra) günün geniş bir bölümüdür. Sabah, öğle ve akşamüzeri bölümleri <strong>IN</strong> (in the morning/afternoon/evening) alır. Ancak 'gece' AT (at night) alır.<br><br><strong>Cevap: on / at / in / in</strong>",
                    shortcut: "Gramer sorularında boşluğun ardından gelen kelime bir 'Aktivite veya Kurum' (party, concert, school, work) ise ve sen o eylemin tam o noktada gerçekleştiğini vurguluyorsan çoğunlukla <strong>AT</strong> (at a party, at work, at school) kullanırsın."
                },
                {
                    title: "4. Modals I (Kiplikler ve Yardımcı Fiiller)",
                    summary: "Can/Could, Must/Have to, Should/Ought to kullanımı ve anlam farkları.",
                    description: "<p>Modals (Kiplikler), ana fiile yetenek, zorunluluk, olasılık veya tavsiye anlamı katan yardımcı fiillerdir. Her zaman fiilin 1. hali (V1) ile kullanılırlar.</p><p><strong>Yetenek (Ability):</strong><br>- <em>Can:</em> Şu anki (Present) yetenekler (I can swim).<br>- <em>Could:</em> Geçmişteki (Past) yetenekler (I could run fast when I was young).<br>- <em>Be able to:</em> Tüm zamanlara çekimlenebilen yetenek kalıbıdır (I will be able to speak English fluently next year).</p><p><strong>Zorunluluk (Obligation):</strong><br>- <em>Must:</em> İçten gelen, konuşanın kendi kendine koyduğu güçlü zorunluluktur (I must study hard to pass). Ayrıca <strong>Güçlü Tahmin</strong> bildirir (He has a Ferrari, he must be rich - Zengin olmalı).<br>- <em>Have to:</em> Dışarıdan gelen, kurallara ve kanunlara dayalı mecburiyettir (We have to wear a uniform at school).<br>- <strong>DİKKAT:</strong> Olumsuzları tamamen farklıdır! <em>Mustn't</em> KESİN YASAK bildirir (You mustn't smoke here - Yasak!). <em>Don't have to / Needn't</em> ise YAPMANA GEREK YOK, İHTİYAÇ YOK bildirir, yasak değildir (Tomorrow is Sunday, you don't have to wake up early - Uyanmak zorunda değilsin, istersen uyan).</p><p><strong>Tavsiye (Advice):</strong><br>- <em>Should / Ought to:</em> Bir şeyi yapmanın iyi fikir olduğunu (tavsiye) belirtir. İkisi eş anlamlıdır (You should see a doctor = You ought to see a doctor).<br>- <em>Had better:</em> Daha güçlü bir tavsiyedir, içinde hafif bir uyarı/tehdit barındırır (You had better study, or you will fail - Çalışsan iyi olur, yoksa kalırsın).</p>",
                    items: ["Can ve Could (Yetenek ve İzin)", "Must ve Have to (İçsel ve Dışsal Zorunluluk)", "Mustn't (Yasak) ve Don't Have to (Gereklilik Yok) Farkı", "Should, Ought to ve Had Better (Tavsiye/Uyarı)", "Be Able To (Tüm Zamanlara Çekimlenebilen Yetenek)"],
                    formula: "$$\\text{Modal } + \\text{ V}_1 \\text{ (Özneye göre } -s, -ed \\text{ takısı KESİNLİKLE ALMAZ)}$$",
                    question: "Aşağıdaki iki cümle arasındaki anlam farkını açıklayınız:<br>1. You mustn't wash the car.<br>2. You don't have to wash the car.",
                    solution: "YDT'de en çok düşülen tuzak bu iki kalıbın olumsuzlarıdır.<br>1. <strong>You mustn't wash the car:</strong> 'Mustn't' kesin bir yasak (Prohibition) bildirir. Anlamı: Arabayı yıkaman <strong>yasak</strong>, kesinlikle yıkama (Örneğin arabanın boyası yeni atılmış, su değerse bozulur).<br>2. <strong>You don't have to wash the car:</strong> 'Don't have to' (veya needn't) bir zorunluluğun ortadan kalktığını (Lack of obligation) belirtir. Anlamı: Arabayı <strong>yıkamak zorunda değilsin</strong>, çünkü zaten temiz (ama istersen keyfi olarak yıkayabilirsin, yasak değil).<br><br><strong>Cevap: 1. Cümle kesin YASAK bildirir. 2. Cümle İHTİYAÇ/ZORUNLULUK OLMADIĞINI (serbestlik) bildirir.</strong>",
                    shortcut: "Bir çıkarım (Deduction) sorusunda, eldeki güçlü kanıtlara bakarak '%90 böyledir' diyorsak olumlu cümlede <strong>MUST</strong> (It must be true), '%90 böyle değildir/imkansız' diyorsak olumsuz cümlede <strong>CAN'T</strong> (It can't be true) kullanırız. Çıkarımlarda 'Mustn't' kullanılmaz!"
                },
                {
                    title: "5. Adjectives, Adverbs & Comparisons (Sıfatlar, Zarflar ve Karşılaştırmalar)",
                    summary: "Sıfat ve zarf farkı, Comparative (Daha) ve Superlative (En) kuralları.",
                    description: "<p><strong>Adjectives (Sıfatlar) vs. Adverbs (Zarflar):</strong><br>- <em>Sıfatlar</em> isimleri niteler (A <strong>slow</strong> car). Am/is/are gibi 'to be' fiillerinden veya 'look, seem, sound, taste' gibi duyu/durum fiillerinden sonra gelirler (You look <strong>beautiful</strong>).<br>- <em>Zarflar</em> eylemleri (fiilleri) niteler ve eylemin 'nasıl' yapıldığını söyler. Genellikle sıfatın sonuna '-ly' eklenerek yapılırlar (He drives <strong>slowly</strong>).<br>- <em>İstisnalar:</em> 'Good' sıfattır, zarf hali 'Well'dir. (He is a <em>good</em> player $\\rightarrow$ He plays <em>well</em>). 'Fast, hard, late, early' kelimeleri hem sıfat hem zarftır, '-ly' almazlar (He is a fast runner $\\rightarrow$ He runs fast. <strong>DİKKAT:</strong> 'Hardly' kelimesi 'zorla' demek değildir, 'hemen hemen hiç' anlamına gelen bambaşka bir sıklık zarfıdır).</p><br><p><strong>Comparatives (İki şeyi karşılaştırma - 'Daha'):</strong><br>- Kısa (tek heceli) sıfatlara <strong>-er</strong> takısı eklenir + <strong>than</strong> (Taller than, faster than).<br>- Uzun (çok heceli) sıfatların önüne <strong>more</strong> kelimesi gelir + <strong>than</strong> (More beautiful than, more expensive than).<br>- <em>Eşitlik:</em> İki şey birbiriyle eşitse <strong>as + sıfat + as</strong> kalıbı kullanılır (My car is <em>as fast as</em> yours = Arabam seninki kadar hızlı).</p><p><strong>Superlatives (Üç veya daha fazla şey arasında 'En' iyisi):</strong><br>- Kısa sıfatların başına <strong>the</strong>, sonuna <strong>-est</strong> takısı eklenir (The tallest, the fastest).<br>- Uzun sıfatların başına <strong>the most</strong> kelimesi gelir (The most beautiful, the most expensive).<br>- <em>Düzensiz Sıfatlar (Irregular):</em> Good $\\rightarrow$ Better $\\rightarrow$ The best. / Bad $\\rightarrow$ Worse $\\rightarrow$ The worst. / Far $\\rightarrow$ Farther/Further $\\rightarrow$ The farthest/furthest.</p>",
                    items: ["Sıfat (İsim Niteler) ve Zarf (Fiil Niteler) Ayrımı", "-ly Takısı Alan Zarflar ve Düzensiz Zarflar (Good/Well, Fast/Fast)", "Comparative (-er than / more... than) Kuralları", "Superlative (the -est / the most...) Kuralları", "Eşitlik Bildiren (as ... as) Kalıbı"],

        // --- SİSTEM MOTORU (DOKUNMA) ---
        let currentTopics = [];

        function loadGrade(grade) {
            document.querySelectorAll('.grade-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(grade)) btn.classList.add('active');
            });

            currentTopics = dersVerisi[grade] || [];
            const topicList = document.getElementById('topicList');
            topicList.innerHTML = '';

            if(currentTopics.length === 0) {
                topicList.innerHTML = '<p style="color:#64748b;">Bu sınıfa ait konu henüz eklenmedi.</p>';
                document.getElementById('mainContent').innerHTML = '<div class="content-card active" style="text-align:center;">Lütfen yapay zekanın vereceği kod bloğunu bu dosyanın içine yapıştırın.</div>';
                return;
            }

            currentTopics.forEach((topic, index) => {
                const btn = document.createElement('button');
                btn.className = 'topic-btn';
                btn.innerText = topic.title;
                btn.onclick = () => renderTopic(index, btn);
                topicList.appendChild(btn);
            });

            renderTopic(0, topicList.firstChild);
        }

        function renderTopic(index, btnElement) {
            document.querySelectorAll('.topic-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const topic = currentTopics[index];
            const mainContent = document.getElementById('mainContent');
            
            let html = `<div class="content-card active">
                <h2>${topic.title}</h2>
                <div class="summary-box">${topic.summary}</div>
                <div class="desc-text">${topic.description}</div>
            `;

            if(topic.formula) html += `<div class="formula-box">${topic.formula}</div>`;
            if(topic.question) {
                html += `<div class="example-box">
                            <h5 style="color:#047857; margin-bottom:0.8rem; display:flex; align-items:center;">✍️ Çözümlü Örnek</h5>
                            <div style="font-weight:600; color:#065f46; margin-bottom:1rem;">Soru: ${topic.question}</div>
                            <div style="color:#064e3b; border-top:2px dashed #a7f3d0; padding-top:1rem; line-height:1.7;">
                                <strong>Çözüm:</strong> ${topic.solution}
                            </div>
                         </div>`;
            }
            if(topic.shortcut) html += `<div class="shortcut-box"><strong>🚀 Püf Noktası:</strong> ${topic.shortcut}</div>`;
            
            html += `</div>`;
            mainContent.innerHTML = html;

            if (window.MathJax) MathJax.typesetPromise();
        }
