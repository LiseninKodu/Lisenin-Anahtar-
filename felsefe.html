                    description: "<p>Dünya Savaşları, teknolojik yıkımlar ve yalnızlaşan modern insanın anlam arayışı bu dönemi şekillendirmiştir.</p><p><strong>1. Fenomenoloji (Görüngübilim - Edmund Husserl):</strong> Doğru bilgi, varlıkların arkasındaki 'Öz'ü kavramaktır. Bir nesnenin (örneğin bir elmanın) rengini, kokusunu, şeklini ve hakkındaki tüm ön yargılarımızı <em>'Paranteze Alarak (Dışarıda Bırakarak)'</em>, geriye kalan saf bilincimize (özüne) ulaşma yöntemidir.</p><p><strong>2. Egzistansiyalizm (Varoluşçuluk - J.P. Sartre):</strong> Dönemin en popüler akımıdır. Sartre'a göre <em>'Varoluş, özden önce gelir.'</em> Bir masa üretilmeden önce zihinde tasarımı (özü) vardır, sonra masa olarak var olur. Ancak insan önce dünyaya fırlatılır (var olur), sonra kendi kararları ve seçimleriyle kendi özünü, kaderini kendisi yaratır. Bu yüzden insan tamamen <strong>Özgürdür</strong> ve yaptığı her eylemden sonuna kadar <strong>Sorumludur</strong> (Bu sorumluluk insanda 'Bunaltı/Angst' yaratır).</p><p><strong>3. Mantıkçı Pozitivizm (Analitik Felsefe):</strong> Wittgenstein öncüsüdür. Felsefenin görevi dünyayı anlamak değil, 'Dili' analiz etmektir. <em>'Dilimin sınırları dünyamın sınırlarıdır.'</em> Metafizik (Tanrı, ruh, ahlak) deneyle doğrulanamadığı için anlamsızdır ve felsefenin konusu olamaz. Sadece bilimsel, deneye dayalı önermeler felsefenin konusu olmalıdır.</p><p><strong>4. Bilim Felsefesi (Thomas Kuhn):</strong> Bilimin kesintisiz, kümülatif (birikerek) ilerlediği fikrini yıkar. Kuhn'a göre bilim, devrimsel sıçramalarla ilerler. Dönemin kabul gören bilimsel kurallar bütününe <strong>Paradigma</strong> denir. Bir paradigma sorunları çözemediğinde kriz çıkar, eski paradigma çöpe atılır ve 'Bilimsel Devrim' ile yepyeni bir paradigmaya geçilir (Batlamyus'tan Kopernik'e geçiş gibi).</p>",
