                    solution: "Gelişmekte olan ülkelerin en büyük ekonomik sorunu, dışarıdan aldıkları ürünlerin (ithalat), dışarıya sattıkları ürünlerden (ihracat) fazla olmasıdır.<br>1. İthalat > İhracat durumuna <strong>Dış Ticaret Açığı</strong> denir.<br>2. Bu açığı kapatmak için ülkeye sıcak para (Döviz) girmesi gerekir.<br>3. Yabancı turistler ülkeye gelirken kendi ülkelerinin parasını (Dolar, Euro) getirip burada harcarlar.<br>4. Herhangi bir fabrika bacası tütmeden ülkeye giren bu döviz sayesinde, ülkenin dış ticaret açığı (cari açık) büyük ölçüde kapanır.<br><br><strong>Cevap: Ülkeye döviz girdisi sağlayarak 'Dış Ticaret Açığını (Cari Açığı)' kapatmasıdır.</strong>",
                    shortcut: "UNESCO miras listesinde sadece iki tane 'Karma' (Hem doğanın kendi kendine yaptığı hem de insanın şekil verdiği) alanımız vardır. Bunlar: 1. Pamukkale Travertenleri (Doğal) + Hierapolis Antik Kenti (Kültürel). 2. Peribacaları (Doğal) + Göreme yeraltı kiliseleri/şehirleri (Kültürel). Sınavlarda bu karma alanlar mutlaka sorulur."
                }


            ]
        };

        // --- SİSTEM MOTORU (DOKUNMA) ---
        let currentTopics = [];

        function loadGrade(grade) {
            document.querySelectorAll('.grade-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(grade)) btn.classList.add('active');
            });

            currentTopics = dersVerisi[grade] || [];
            const topicList = document.getElementById('topicList');
            topicList.innerHTML = '';

            if(currentTopics.length === 0) {
                topicList.innerHTML = '<p style="color:#64748b;">Bu sınıfa ait konu henüz eklenmedi.</p>';
                document.getElementById('mainContent').innerHTML = '<div class="content-card active" style="text-align:center;">Lütfen yapay zekanın vereceği kod bloğunu bu dosyanın içine yapıştırın.</div>';
                return;
            }

            currentTopics.forEach((topic, index) => {
                const btn = document.createElement('button');
                btn.className = 'topic-btn';
                btn.innerText = topic.title;
                btn.onclick = () => renderTopic(index, btn);
                topicList.appendChild(btn);
            });

            renderTopic(0, topicList.firstChild);
        }

        function renderTopic(index, btnElement) {
            document.querySelectorAll('.topic-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const topic = currentTopics[index];
            const mainContent = document.getElementById('mainContent');
            
            let html = `<div class="content-card active">
                <h2>${topic.title}</h2>
                <div class="summary-box">${topic.summary}</div>
                <div class="desc-text">${topic.description}</div>
            `;

            if(topic.formula) html += `<div class="formula-box">${topic.formula}</div>`;
            if(topic.question) {
                html += `<div class="example-box">
                            <h5 style="color:#047857; margin-bottom:0.8rem; display:flex; align-items:center;">✍️ Çözümlü Örnek</h5>
                            <div style="font-weight:600; color:#065f46; margin-bottom:1rem;">Soru: ${topic.question}</div>
                            <div style="color:#064e3b; border-top:2px dashed #a7f3d0; padding-top:1rem; line-height:1.7;">
                                <strong>Çözüm:</strong> ${topic.solution}
                            </div>
                         </div>`;
            }
            if(topic.shortcut) html += `<div class="shortcut-box"><strong>🚀 Püf Noktası:</strong> ${topic.shortcut}</div>`;
            
            html += `</div>`;
            mainContent.innerHTML = html;

            if (window.MathJax) MathJax.typesetPromise();
        }

        // Gemini API
        const GEMINI_API_KEY = 'AIzaSyCDQWieXsYuLKmmLUpwwGVp0Mo39SZsZgw'; 
        let base64Image = '';

        document.getElementById('aiImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => { base64Image = e.target.result.split(',')[1]; };
                reader.readAsDataURL(file);
            }
        });

        async function solveQuestion() {
            if(!base64Image) return alert("Lütfen önce bir fotoğraf seçin!");
            const resultBox = document.getElementById('aiResult');
            resultBox.style.display = 'block';
            resultBox.innerHTML = 'Soruyu inceliyorum, lütfen bekle... ⏳';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AIzaSyCTHdkBEVWeD-ym3ZrPYp3iE3Pguaofb_Y}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [ { text: "Sen uzman bir öğretmensin. Bu soruyu adım adım, mantığını anlatarak çöz. Formülleri LaTeX ($$x^2$$) formatında yaz." }, { inline_data: { mime_type: "image/jpeg", data: base64Image } } ] }]
                    })
                });
                const data = await response.json();
                resultBox.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                if (window.MathJax) MathJax.typesetPromise();
            } catch (err) {
                resultBox.innerHTML = "Bir hata oluştu veya API anahtarınız eksik.";
            }
        }

        window.onload = () => loadGrade(9);
    </script>
